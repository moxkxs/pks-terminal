[manager]
sort_by = "natural"
sort_dir_first = true
show_hidden = false
show_symlink = true

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
    { run = 'open "$@"', for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/pdf", use = "open" },
    { name = "*.lua", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.yml", use = "edit" },
]
